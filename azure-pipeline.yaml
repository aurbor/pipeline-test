trigger: none

parameters:
  - name: deployPH
    displayName: Deploy PH
    type: boolean
    default: false
  - name: deployPC
    displayName: Deploy PC
    type: boolean
    default: false
  - name: deployDP
    displayName: Deploy DP
    type: boolean
    default: false

stages:
  - ${{ if eq(parameters.deployPH, true) }}:
    - stage: PH_Sandbox
      displayName: PH — Sandbox
      dependsOn: []
      jobs:
        - job: build_deploy
          displayName: Build & Deploy
          steps:
            - script: echo "Building PH for sandbox"
              displayName: Build
            - script: echo "Deploying PH to sandbox"
              displayName: Deploy

    - stage: PH_Production
      displayName: PH — Production
      dependsOn: PH_Sandbox
      jobs:
        - deployment: build_deploy
          displayName: Build & Deploy
          environment: production-PH
          strategy:
            runOnce:
              deploy:
                steps:
                  - script: echo "Building PH for production"
                    displayName: Build
                  - script: echo "Deploying PH to production"
                    displayName: Deploy

  - ${{ if eq(parameters.deployPC, true) }}:
    - stage: PC_Sandbox
      displayName: PC — Sandbox
      dependsOn: []
      jobs:
        - job: build_deploy
          displayName: Build & Deploy
          steps:
            - script: echo "Building PC for sandbox"
              displayName: Build
            - script: echo "Deploying PC to sandbox"
              displayName: Deploy

    - stage: PC_Production
      displayName: PC — Production
      dependsOn: PC_Sandbox
      jobs:
        - deployment: build_deploy
          displayName: Build & Deploy
          environment: production-PC
          strategy:
            runOnce:
              deploy:
                steps:
                  - script: echo "Building PC for production"
                    displayName: Build
                  - script: echo "Deploying PC to production"
                    displayName: Deploy

  - ${{ if eq(parameters.deployDP, true) }}:
    - stage: DP_Sandbox
      displayName: DP — Sandbox
      dependsOn: []
      jobs:
        - job: build_deploy
          displayName: Build & Deploy
          steps:
            - script: echo "Building DP for sandbox"
              displayName: Build
            - script: echo "Deploying DP to sandbox"
              displayName: Deploy

    - stage: DP_Production
      displayName: DP — Production
      dependsOn: DP_Sandbox
      jobs:
        - deployment: build_deploy
          displayName: Build & Deploy
          environment: production-DP
          strategy:
            runOnce:
              deploy:
                steps:
                  - script: echo "Building DP for production"
                    displayName: Build
                  - script: echo "Deploying DP to production"
                    displayName: Deploy